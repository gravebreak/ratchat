<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0">
		<meta name="robots" content="noindex, nofollow">
		
		<title>ratchat</title>
		<link rel="stylesheet" href="https://unpkg.com/98.css">
		<style>

		.hide-scrollbar {
			scrollbar-width: none;
			-ms-overflow-style: none;
		}

		.hide-scrollbar::-webkit-scrollbar {
			display: none;
		}
	
		body {
			height: 100%;
			margin: 0;
			padding: 0rem;
			box-sizing: border-box;
			overflow: hidden;
		}

		.window{
			display: flex;
			flex-direction: column;
			margin: 0;
			width: auto;
		}

		.window-body {
			display: flex;
			flex-direction: column;
			height: calc(100vh - 2rem);
			margin: 0;
			padding: 0.2rem;
		}

		.title-bar-controls {
			display: flex;
			gap: 0.125rem;
			padding: 0;
		}

		.title-bar-controls button {
			margin: 0 !important;
		}

		.error-popup {
			display: block; 
			position: fixed; 
			top: 50%; 
			left: 50%; 
			transform: translate(-50%, -50%); 
			z-index: 1000;
		}
		.error-popup .window {
			width: 15rem;
			max-width: min(30rem, 80vw);
			min-width: 12rem;
			max-height: 10rem;
			color: #000000;
		}
		.error-content {
			flex-grow: 1;
			background-color: #ffffff;
			box-shadow: inset -0.0625rem -0.0625rem #ffffff,
						inset 0.0625rem 0.0625rem #0a0a0a, 
						inset -0.125rem -0.125rem #dfdfdf, 
						inset 0.125rem 0.125rem #808080;
			padding: 0.625rem;
			max-height: 12rem;
			overflow-y: auto;
		}
		.error-popup .field-row {
			display: flex;
			justify-content: center;
			padding-top: 0.5rem;
		}

		#form{
			display: flex;
			gap: 0.125rem;
			padding-top: 0.125rem;
			align-items: stretch;
			height: 2rem;
			flex-wrap: nowrap;
		}
		#form button {
			padding: 0;
			box-sizing: border-box;
			min-width: 2rem;
			max-width: 2rem;
			font-size: 1.7rem;
			display: flex;
			flex-shrink: 0;
			line-height: 0;
			align-items: center;
			justify-content: center;
			background: #c0c0c0;
			border: none;
		}
		#form button[type="submit"]{
			max-width: 7.5475rem !important;
			min-width: 7.5475rem !important;
			font-size: 1rem !important;
		}
		#input {
			border: none;
			height: 100%;
			padding: 0 0.5rem;
			flex: 1 1 0;
			min-width: 0;
			font-size: 1rem;
			box-sizing: border-box;
			margin-right: .0625rem;
		}	
		#input:focus {
			outline: none;
		}

		#user-sidebar {
			flex: 0 0 9.7600rem; 
			background: #ffffff;
			box-shadow: 
						inset -0.0625rem -0.0625rem #ffffff, 
						inset 0.0625rem 0.0625rem #0a0a0a, 
						inset -0.125rem -0.125rem #dfdfdf, 
						inset 0.125rem 0.125rem #808080;
			padding: 0.3125rem;
			margin-top: 0.25rem;
			margin-bottom: 0.25rem;			
			overflow-y: auto;
			overflow-x: hidden;
			flex-shrink: 0;
			display: flex;
			flex-direction: column;
		}
		#user-sidebar.collapsed {
			flex-basis: 0 !important;
			padding: 0 !important;
			margin: 0 !important;
			overflow: hidden;
			border: none;
		}
		#user-sidebar.collapsed + .fake-scrollbar, 
		#user-sidebar.collapsed ~ .fake-scrollbar,
		#messages-container ~ .fake-scrollbar:has(+ #user-sidebar.collapsed){
			margin-right: 0;
		}
		#user-list {
			flex-grow: 1;
			overflow-y: auto;
			overflow-x:hidden;
			list-style: none;
			padding: 0;
			margin: 0.25rem;
			font-size: large;
		}
		.user-list-span {
			white-space: nowrap;
			display: flex;
			align-items: center;
			width: 100%;
			overflow: hidden;
		}
		.user-list-span span:nth-child(2){
			flex-shrink: 1;
			flex-grow: 1;
			min-width: 0;
		}
		.user-count{
			color: #575963;
			text-align: right;
		}
		.user-status {
			display: block;
			font-size: 0.75rem;
			color: #575963;
			margin-left: 0.75rem;
		}
		.status-orb {
			display: inline-block;
			width: 0.7rem;
			height: 0.7rem;
			border-radius: 50%;
			margin-right: 0.375rem;
			margin-bottom: 0.175rem;
			flex-shrink: 0;
			border: 0.0625rem solid rgba(0,0,0,0.2);
		}
		.orb-online {
			background: radial-gradient(circle at 0.1875rem 0.1875rem, #52ff52, #008000);
			box-shadow: 0.0625rem 0.0625rem 0.0625rem rgba(0,0,0,0.3);
		}

		.orb-afk {
			background: radial-gradient(circle at 0.1875rem 0.1875rem, #ffb84d, #ff8c00);
			box-shadow: 0.0625rem 0.0625rem 0.0625rem rgba(0,0,0,0.3);
		}
		#lurker-status{
			color:#575963;
			font-size: small;
			min-height: 1rem;
			flex-shrink: 0;
			text-align: center;
		}

		#messages-container {
			flex-grow: 1;
			background-color: #ffffff;
			background-blend-mode: normal;
			background-repeat: repeat;
			background-position: center;
			background-size: 25%;
			box-shadow: inset -0.0625rem -0.0625rem #ffffff,
						inset 0.0625rem 0.0625rem #0a0a0a, 
						inset -0.125rem -0.125rem #dfdfdf, 
						inset 0.125rem 0.125rem #808080;
			padding: 0.625rem;
			margin-top: 0.25rem;
			margin-bottom: 0.25rem;
			display: flex;
			flex-direction: column;
			overflow-y: auto;
		}
		.has-bg{
			background-color: rgba(255, 255, 255, 0.5) !important;
			background-blend-mode: overlay !important;
		}
		.emote {
			height: 1.5rem;
			vertical-align: bottom;
			margin: -0.1rem;
		}

		#messages {
			list-style-type: none;
			margin: 0;
			padding: 0;
			margin-top: auto;
			font-size: large;
		}
		#messages > li {
			padding: 0.2rem 0.5rem; 
		}
		#messages > .e-li {
			padding: 0.2rem 0.5rem; 
			color: #D12626;
			white-space: pre-wrap;
		}
		#messages > .i-li {
			padding: 0.2rem 0.5rem; 
			color: #575963;
			white-space: pre-wrap;
		}
		#messages > .w-li {
			padding: 0.2rem 0.5rem;
			color: #33343B;
			white-space: pre-wrap;
		}
		#messages > .a-li {
			padding: 0.2rem 0.5rem; 
			color: #6eab6e;
			white-space: pre-wrap;
		}
		#messages .user-name {
			font-weight: bold;
			color: var(--user-color, black);
			margin-right: .15rem;
		}
		#messages > li:hover {
			cursor: pointer;
			background-color: rgba(0, 0, 0, 0.05);
		}

		.fake-scrollbar {
			width: 1.2rem;
			background: #dfdfdf;
			display: flex;
			flex-direction: column;
			flex-shrink: 0;
			margin: 0.25rem 0.2rem;
		}
		.fake-scroll-button {
			width: 1.2rem;
			height: 1.2rem;
			padding: 0;
			min-width: 1.2rem;
			min-height: 1.2rem;
			font-size: 0.6rem;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #c0c0c0;
			border: none;
			box-shadow: 
						inset 0.0625rem 0.0625rem #ffffff, 
						inset -0.0625rem -0.0625rem #0a0a0a, 
						inset 0.125rem 0.125rem #dfdfdf, 
						inset -0.125rem -0.125rem #808080;
		}
		.fake-scroll-track {
			flex-grow: 1;
			position: relative;
			background-size: 0.2rem 0.2rem;
			background-position: 0 0, 0 0.1rem, 0.1rem -0.1rem, -0.1rem 0rem;
			background-color: #dfdfdf;
			box-shadow: 
					inset -0.0625rem -0.0625rem #ffffff, 
					inset 0.0625rem 0.0625rem #808080;
		}
		#error-fake-scroll-thumb,
		#fake-scroll-thumb {
			width: 100%;
			height: 2rem;
			background: #c0c0c0;
			position: absolute;
			left: 50%;
			transform: translateX(-50%);
			border: none;	
			box-shadow: 
					inset 0.0625rem 0.0625rem #ffffff, 
					inset -0.0625rem -0.0625rem #0a0a0a, 
					inset 0.125rem 0.125rem #dfdfdf, 
					inset -0.125rem -0.125rem #808080;
		}
		.error-popup .fake-scrollbar {
			margin-top: 0;
			margin-bottom: 0;
			margin-right: 0;
		}

		/* DARK MODE */
		[data-theme="dark"] .has-bg {
			background-color: rgba(0, 0, 0, 0.5) !important;
		}
		
		[data-theme="dark"] .window {
			background: #000000;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}

		[data-theme="dark"] .title-bar {
			background: linear-gradient(to right, #2b004f, #a46cff);
			color: #ffffff;
		}

		[data-theme="dark"] .window-body, 
		[data-theme="dark"] .window-body p, 
		[data-theme="dark"] .window-body div {
			color: #ffffff !important;
		}

		[data-theme="dark"] .error-content,
		[data-theme="dark"] #messages-container,
		[data-theme="dark"] #input,
		[data-theme="dark"] #user-sidebar {
			background-color: #2a2a2a;
			color: #ffffff;
			box-shadow:
				inset 0.0625rem 0.0625rem #111111,
				inset -0.0625rem -0.0625rem #444444,
				inset 0.125rem 0.125rem #222222,
				inset -0.125rem -0.125rem #555555;
		}

		[data-theme="dark"] .popup-button{
			background: #3a3a3a;
			color: #ffffff;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}
		[data-theme="dark"] .popup-button:active {
			box-shadow:
				inset 0.0625rem 0.0625rem #111111,
				inset -0.0625rem -0.0625rem #444444,
				inset 0.125rem 0.125rem #222222,
				inset -0.125rem -0.125rem #555555;
		}
		[data-theme="dark"] #form button{
			background: #3a3a3a;
			color: #ffffff;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}
		[data-theme="dark"] #form button:active {
			box-shadow:
				inset 0.0625rem 0.0625rem #111111,
				inset -0.0625rem -0.0625rem #444444,
				inset 0.125rem 0.125rem #222222,
				inset -0.125rem -0.125rem #555555;
		}
		[data-theme="dark"] #messages > li {
			color: #ffffff;
		}
		[data-theme="dark"] #messages > .e-li { color: #ff8a8a; }
		[data-theme="dark"] #messages > .i-li { color: #d0d0d0; }
		[data-theme="dark"] #messages > .w-li { color: #8ac7ff; }
		[data-theme="dark"] #messages > .a-li { color: #9df79d; }
		[data-theme="dark"] #messages > li:hover {
			background-color: rgba(255, 255, 255, 0.08);
		}

		[data-theme="dark"] .fake-scrollbar {
			background: #2a2a2a;
		}

		[data-theme="dark"] .fake-scroll-button {
			background: #3a3a3a;
			color: #ffffff;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}

		[data-theme="dark"] .fake-scroll-button:active {
			box-shadow:
				inset 0.0625rem 0.0625rem #111111,
				inset -0.0625rem -0.0625rem #444444,
				inset 0.125rem 0.125rem #222222,
				inset -0.125rem -0.125rem #555555;
		}

		[data-theme="dark"] .fake-scroll-track {
			background-color: #555555;
			box-shadow: 
					inset 0.0625rem 0.0625rem #333333, 
					inset -0.0625rem -0.0625rem #666666;
		}

		[data-theme="dark"] #fake-scroll-thumb,
		[data-theme="dark"] #error-fake-scroll-thumb {
			background: #3a3a3a;
			color: #ffffff;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}

		</style>
	</head>

	<body>

	<div class="window">

		<div id="error-popup" class="error-popup">
			<div class="window">

				<div class="title-bar">
					<div class="title-bar-text">ratchat32.exe - fatal error</div>
					<div class="title-bar-controls">
						<button aria-label="Close"></button>
					</div>
				</div>

				 <div class="window-body">
							<div style="display: flex; gap: 0.9375rem; align-items: center; margin: 0.625rem 0.3125rem 1.25rem 0.3125rem;">
								<div style="font-size: 2rem; color: #ff0000; text-shadow: 0.0625rem 0.0625rem 0rem #000; user-select: none;">&#10006;</div>
								<div>
									<p style="margin: 0 0 0.5rem 0;"><strong>teh ratchat is currently closed, dayo</strong></p>
									<p style="margin: 0; font-size: 0.6875rem;">
										error code: 0x67<br>
										<br>
										come back later to squeak some more. see you soon.
									</p>
								</div>
							</div>
							<div style="display: flex; justify-content: center; margin-top: -0.5rem; padding-bottom: 0.5rem;">
								<button class="popup-button" style="width: 6.25rem;" onclick="window.location.href='/'">Return Home</button>
					</div>
				</div>
			</div>				
		</div>

		<div class="title-bar">
			<div class="title-bar-text">ratchat32.exe</div>
			<div class="title-bar-controls">
				<button aria-label="Minimize"></button>
				<button aria-label="Maximize"></button>
				<button aria-label="Close"></button>
			</div>
		</div>

		<div class="window-body">
			<div style="display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; gap: 0rem;">

				<div id="messages-container" class="hide-scrollbar">
					<ul id="messages"></ul>
				</div>

				<div class="fake-scrollbar">
					<button class="fake-scroll-button" id="btn-up">&#9650;</button>
					<div class="fake-scroll-track" id="track">
						<div id="fake-scroll-thumb"></div>
					</div>
					<button class="fake-scroll-button" id="btn-down">&#9660;</button>
				</div>
				
				<div id="user-sidebar" class="hide-scrollbar">
					<ul id="user-list"></ul>
					<div id="lurker-status"></div>
				</div>

			</div>

			<form id="form" action="">
				<input id="input" type="text" autocomplete="off" readonly value="Connection lost..."/>
				<button type="submit">Send</button>
				<button type="button" id="btn-error" title="error" style="font-size: 2.2rem; padding-bottom: 0.25rem;">&#9786;</button>
				<button type="button" id="btn-users" title="users" style="font-size:1.2rem">&#128101;</button>
			</form>
		</div>		

	</div>
		<script>
		const savedBG = localStorage.getItem('ratBG');
		const savedTheme = localStorage.getItem('ratMode');
		if(savedTheme === 'dark'){
			document.documentElement.setAttribute('data-theme', 'dark');
		}
		if(savedBG){
			document.getElementById('messages-container').style.backgroundImage = `url('${savedBG}')`;
			document.getElementById('messages-container').classList.add('has-bg');
		}
	</script>
	</body>
</html>
