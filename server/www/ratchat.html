<!DOCTYPE html>
<html>
	<head>
		<meta name="robots" content="noindex, nofollow">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
		
		<title>ratchat</title>
		<link rel="stylesheet" href="https://unpkg.com/98.css">
		<style>

		.hide-scrollbar {
			scrollbar-width: none;
			-ms-overflow-style: none;
		}

		.hide-scrollbar::-webkit-scrollbar {
			display: none;
		}

		html {
			background-color: #000000;
		}

		body {
			height: 100dvh;
			margin: 0;
			padding: 0rem;
			box-sizing: border-box;
			overflow: hidden;
		}

		.window {
			display: flex;
			flex-direction: column;
			margin: 0;
			width: auto;
		}

		.window-body {
			display: flex;
			flex-direction: column;
			height: calc(100dvh - 2rem);
			margin: 0;
			padding: 0.2rem;
		}

		.title-bar-controls {
			display: flex;
			gap: 0.125rem;
			padding: 0;
		}

		.title-bar-controls button {
			margin: 0 !important;
		}

		#emotes-popup {
			display: none; 
			position: fixed; 
			top: 50%; 
			left: 50%; 
			transform: translate(-50%, -50%); 
			z-index: 1000;
		}
		#emotes-popup.is-visible {
			display: block;
		}
		#emotes-popup .window {
			width: 30rem;
			max-width: min(30rem, 80vw);
			min-width: 12rem;
			max-height: 16.125rem;
		}
		#emotes-popup .window-body { 
			height: auto; 
			max-height: 100%; 
		}
		.emotes-content {
			flex-grow: 1;
			position: relative;
			background-color: #ffffff;
			box-shadow: inset -0.0625rem -0.0625rem #ffffff,
						inset 0.0625rem 0.0625rem #0a0a0a, 
						inset -0.125rem -0.125rem #dfdfdf, 
						inset 0.125rem 0.125rem #808080;
			max-height: 12rem;
			height:12rem;
			overflow: hidden;
		}
		#emotes-grid-wrapper {
			position: absolute;
			inset: 0.625rem 0.625rem;
			overflow-y: auto;
		}
		#search {
			padding: 0 0.5rem;
			min-width: 0;
			font-size: .625rem;
			height: 1.125rem;
			box-sizing: border-box;
			margin-bottom: .125rem;
		}	
		#search:focus {
			outline: none;
		}
		#search::placeholder{
			color: #999999;
		}

		#form{
			display: flex;
			gap: 0.125rem;
			padding-top: 0.125rem;
			align-items: stretch;
			height: 2rem;
			flex-wrap: nowrap;
		}
		#form button {
			padding: 0;
			box-sizing: border-box;
			min-width: 2rem;
			max-width: 2rem;
			font-size: 1.7rem;
			display: flex;
			flex-shrink: 0;
			line-height: 0;
			align-items: center;
			justify-content: center;
			background: #c0c0c0;
			border: none;
		}
		#form button[type="submit"] {
			max-width: 7.5475rem !important;
			min-width: 7.5475rem !important;
			font-size: 1rem !important;
		}
		#input {
			border: none;
			height: 100%;
			padding: 0 0.5rem;
			flex: 1 1 0;
			min-width: 0;
			font-size: 1rem;
			box-sizing: border-box;
			margin-right: 0.0625rem;
			text-indent: 0.0625rem;
		}	
		#input:focus {
			outline: none;
		}

		#user-sidebar {
			flex: 0 0 9.7600rem; 
			background: #ffffff;
			box-shadow: 
						inset -0.0625rem -0.0625rem #ffffff, 
						inset 0.0625rem 0.0625rem #0a0a0a, 
						inset -0.125rem -0.125rem #dfdfdf, 
						inset 0.125rem 0.125rem #808080;
			padding: 0.3125rem;
			margin-top: 0.25rem;
			margin-bottom: 0.25rem;			
			overflow-y: auto;
			overflow-x: hidden;
			flex-shrink: 0;
			display: flex;
			flex-direction: column;
		}
		#user-sidebar.collapsed {
			flex-basis: 0 !important;
			padding: 0 !important;
			margin: 0 !important;
			overflow: hidden;
			border: none;
		}
		#user-sidebar.collapsed + .fake-scrollbar, 
		#user-sidebar.collapsed ~ .fake-scrollbar,
		#messages-container ~ .fake-scrollbar:has(+ #user-sidebar.collapsed) {
			margin-right: 0;
		}
		#user-list {
			flex-grow: 1;
			overflow-y: auto;
			overflow-x:hidden;
			list-style: none;
			padding: 0;
			margin: 0.25rem;
			font-size: large;
		}
		.user-list-span {
			white-space: nowrap;
			display: flex;
			align-items: center;
			width: 100%;
			overflow: hidden;
		}
		.user-list-span span:nth-child(3) {
			flex-shrink: 1;
			flex-grow: 1;
			min-width: 0;
		}
		.user-count {
			color: #575963;
			text-align: right;
		}
		.user-status {
			display: inline-block;
			font-size: 0.75rem;
			color: #575963;
			margin-left: 0.75rem;
			margin-right: 0.75rem;
			white-space: nowrap;
			overflow: hidden;
			position: relative;
			height: 1rem;
			width: 8rem;
		}
		.status-scroll {
			display: inline-block;
			white-space: nowrap;
			padding-left: 0.125rem;
		}
		@keyframes status-marquee {
			0%		{ transform: translateX(0); }
			15%		{ transform: translateX(0); }
			80%		{ transform: translateX(calc(-100% + 8rem)); }
			95%		{ transform: translateX(calc(-100% + 8rem)); }
			95.01%	{ transform: translateX(0); }
			100%	{ transform: translateX(0); }
		}
		.animate-status {
			animation: status-marquee 8s linear infinite;
		}
		.user-status .emote {
			height: 0.9125rem;
			vertical-align: top;
			margin: -0.1rem;
		}

		.mod-badge {
			display: inline-block;
			line-height: 1;
			width: 0.8rem;
			height: 0.8rem;
			vertical-align: middle;
			margin-right: 0.125rem;
			margin-bottom: 0.375rem;
			color: #008000;
		}

		.status-orb {
			display: inline-block;
			width: 0.7rem;
			height: 0.7rem;
			border-radius: 50%;
			margin-right: 0.375rem;
			margin-bottom: 0.175rem;
			flex-shrink: 0;
			border: 0.0625rem solid rgba(0,0,0,0.2);
		}
		.orb-online {
			background: radial-gradient(circle at 0.1875rem 0.1875rem, #52ff52, #008000);
			box-shadow: 0.0625rem 0.0625rem 0.0625rem rgba(0,0,0,0.3);
		}

		.orb-afk {
			background: radial-gradient(circle at 0.1875rem 0.1875rem, #ffb84d, #ff8c00);
			box-shadow: 0.0625rem 0.0625rem 0.0625rem rgba(0,0,0,0.3);
		}
		#lurker-status {
			color:#575963;
			font-size: small;
			min-height: 1rem;
			flex-shrink: 0;
			text-align: center;
		}

		#messages-container {
			flex-grow: 1;
			min-height: 1rem;
			background-color: #ffffff;
			background-blend-mode: normal;
			background-repeat: repeat;
			background-position: center;
			background-size: 25%;
			box-shadow: inset -0.0625rem -0.0625rem #ffffff,
						inset 0.0625rem 0.0625rem #0a0a0a, 
						inset -0.125rem -0.125rem #dfdfdf, 
						inset 0.125rem 0.125rem #808080;
			padding-top: 0.25rem;
			padding-bottom: 0.25rem;
			margin-top: 0.25rem;
			margin-bottom: 0.25rem;
			display: flex;
			flex-direction: column;
			overflow-y: auto;
		}
		.has-bg{
			background-color: rgba(255, 255, 255, 0.5) !important;
			background-blend-mode: overlay !important;
		}
		.emote {
			height: 1.5rem;
			vertical-align: bottom;
			margin: -0.1rem;
		}

		#messages {
			list-style-type: none;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			justify-content: flex-end;
			min-height: 100%;
			font-size: large;
		}
		#messages > li{
			padding-top: 0.2rem;
			padding-bottom: 0.2rem;
			padding-left: 1rem;
			padding-right: 0.2rem;
			white-space: pre-wrap;
			word-break: break-word;
		}
		#messages > .e-li {
			color: #D12626;
		}
		#messages > .i-li {
			color: #575963;
		}
		#messages > .w-li {
			color: #0084FF;
		}
		#messages > .a-li {
			color: #6eab6e;
		}
		#messages > .g-li{
			color: #d038d8
		}
		#messages .user-name {
			font-weight: bold;
			color: var(--user-color, black);
			margin-right: .15rem;
		}
		#messages > li:hover {
			background-color: rgba(0, 0, 0, 0.05);
		}
		#messages > li.hidden-message:hover {
			cursor: pointer;
		}

		.fake-scrollbar {
			width: 1.2rem;
			background: #dfdfdf;
			display: flex;
			flex-direction: column;
			flex-shrink: 0;
			margin: 0.25rem 0.2rem;
		}
		.fake-scroll-button {
			width: 1.2rem;
			height: 1.2rem;
			padding: 0;
			min-width: 1.2rem;
			min-height: 1.2rem;
			font-size: 0.6rem;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #c0c0c0;
			border: none;
			box-shadow: 
						inset 0.0625rem 0.0625rem #ffffff, 
						inset -0.0625rem -0.0625rem #0a0a0a, 
						inset 0.125rem 0.125rem #dfdfdf, 
						inset -0.125rem -0.125rem #808080;
		}
		.fake-scroll-track {
			flex-grow: 1;
			position: relative;
			background-size: 0.2rem 0.2rem;
			background-position: 0 0, 0 0.1rem, 0.1rem -0.1rem, -0.1rem 0rem;
			background-color: #dfdfdf;
			box-shadow: 
					inset -0.0625rem -0.0625rem #ffffff, 
					inset 0.0625rem 0.0625rem #808080;
		}
		#emotes-fake-scroll-thumb,
		#fake-scroll-thumb {
			width: 100%;
			height: 2rem;
			background: #c0c0c0;
			position: absolute;
			left: 50%;
			transform: translateX(-50%);
			border: none;	
			box-shadow: 
					inset 0.0625rem 0.0625rem #ffffff, 
					inset -0.0625rem -0.0625rem #0a0a0a, 
					inset 0.125rem 0.125rem #dfdfdf, 
					inset -0.125rem -0.125rem #808080;
		}
		.emotes-popup .fake-scrollbar {
			margin-top: 0;
			margin-bottom: 0;
			margin-right: 0;
		}

		/* DARK MODE */
		[data-theme="dark"] .has-bg {
			background-color: rgba(0, 0, 0, 0.5) !important;
		}
		
		[data-theme="dark"] .window {
			background: #000000;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}

		[data-theme="dark"] .title-bar {
			background: linear-gradient(to right, #2b004f, #a46cff);
			color: #ffffff;
		}

		[data-theme="dark"] .emotes-content,
		[data-theme="dark"] #messages-container,
		[data-theme="dark"] #input,
		[data-theme="dark"] #search,
		[data-theme="dark"] #user-sidebar {
			background-color: #2a2a2a;
			color: #ffffff;
			box-shadow:
				inset 0.0625rem 0.0625rem #111111,
				inset -0.0625rem -0.0625rem #444444,
				inset 0.125rem 0.125rem #222222,
				inset -0.125rem -0.125rem #555555;
		}
		[data-theme="dark"] #search::placeholder {
			color: #888888;
		}

		[data-theme="dark"] #form button{
			background: #3a3a3a;
			color: #ffffff;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}
		[data-theme="dark"] #form button:active {
			box-shadow:
				inset 0.0625rem 0.0625rem #111111,
				inset -0.0625rem -0.0625rem #444444,
				inset 0.125rem 0.125rem #222222,
				inset -0.125rem -0.125rem #555555;
		}

		[data-theme="dark"] #messages > li {
			color: #ffffff;
		}
		[data-theme="dark"] #messages > .e-li { color: #ff8a8a; }
		[data-theme="dark"] #messages > .i-li { color: #d0d0d0; }
		[data-theme="dark"] #messages > .w-li { color: #8ac7ff; }
		[data-theme="dark"] #messages > .a-li { color: #9df79d; }
		[data-theme="dark"] #messages > .g-li { color: #e889ed; }
		[data-theme="dark"] #messages > li:hover {
			background-color: rgba(255, 255, 255, 0.08);
		}

		[data-theme="dark"] .fake-scrollbar {
			background: #2a2a2a;
		}

		[data-theme="dark"] .fake-scroll-button {
			background: #3a3a3a;
			color: #ffffff;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}

		[data-theme="dark"] .fake-scroll-button:active {
			box-shadow:
				inset 0.0625rem 0.0625rem #111111,
				inset -0.0625rem -0.0625rem #444444,
				inset 0.125rem 0.125rem #222222,
				inset -0.125rem -0.125rem #555555;
		}

		[data-theme="dark"] .fake-scroll-track {
			background-color: #555555;
			box-shadow: 
					inset 0.0625rem 0.0625rem #333333, 
					inset -0.0625rem -0.0625rem #666666;
		}

		[data-theme="dark"] #fake-scroll-thumb,
		[data-theme="dark"] #emotes-fake-scroll-thumb {
			background: #3a3a3a;
			color: #ffffff;
			box-shadow:
				inset -0.0625rem -0.0625rem #111111,
				inset 0.0625rem 0.0625rem #444444,
				inset -0.125rem -0.125rem #222222,
				inset 0.125rem 0.125rem #555555;
		}

		</style>
	</head>

	<body>
	<input type="file" id="bg-upload" style="display: none;" accept="image/*">
	
	<div class="window">

		<div id="emotes-popup" class="emotes-popup">
			<div class="window">

				<div class="title-bar">
					<div class="title-bar-text">click an emote to use</div>
					<div class="title-bar-controls">
						<button aria-label="Close" onclick="document.getElementById('emotes-popup').classList.remove('is-visible')"></button>
					</div>
				</div>

				<div class="window-body">
					<div style="display: flex; flex-direction: row; flex-grow: 1; overflow: hidden;">
						<div style="display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;">			
							<input id="search" type="text" autocomplete="off" placeholder=" type here to search for emotes..."/>				
							<div id="emotes-scroll-container" class="emotes-content hide-scrollbar" style="margin-bottom: 0;">
								<div id="emotes-grid-wrapper" class="hide-scrollbar" ></div>
							</div>
						</div>	
						<div class="fake-scrollbar">
							<button class="fake-scroll-button" id="emotes-btn-up">&#9650;</button>
							<div class="fake-scroll-track" id="emotes-track">
								<div id="emotes-fake-scroll-thumb"></div>
							</div>
							<button class="fake-scroll-button" id="emotes-btn-down">&#9660;</button>
						</div>
					</div>				
				</div>
			</div>				
		</div>

		<div class="title-bar">
			<div class="title-bar-text">ratchat32.exe</div>
			<div class="title-bar-controls">
				<button aria-label="Minimize"></button>
				<button aria-label="Maximize"></button>
				<button aria-label="Close"></button>
			</div>
		</div>

		<div class="window-body">
			<div style="display: flex; flex-direction: row; flex-grow: 1; overflow: hidden; gap: 0rem;">
				
				<div id="messages-container" class="hide-scrollbar">
					<div id="messages-wrapper" class="hide-scrollbar" style="height:100%; width:100%; overflow-y: auto;">
					<ul id="messages"></ul>
					</div>
				</div>

				<div class="fake-scrollbar">
					<button class="fake-scroll-button" id="btn-up">&#9650;</button>
					<div class="fake-scroll-track" id="track">
						<div id="fake-scroll-thumb"></div>
					</div>
					<button class="fake-scroll-button" id="btn-down">&#9660;</button>
				</div>
				
				<div id="user-sidebar" class="hide-scrollbar">
					<ul id="user-list"class="hide-scrollbar"></ul>
					<div id="lurker-status"></div>
				</div>

			</div>

			<form id="form" action="">
				<input id="input" type="text" autocomplete="off" />
				<button type="submit">Send</button>
				<button type="button" id="btn-emotes" title="emotes" style="font-size: 2.2rem; padding-bottom: 0.25rem;">&#9786;</button>
				<button type="button" id="btn-users" title="users" style="font-size:1.2rem">&#128101;</button>
			</form>
		</div>		

	</div>

	<script src="https://cdn.socket.io/4.8.3/socket.io.min.js" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.3/purify.min.js" crossorigin="anonymous"></script>
	<script>
		const localGUID = localStorage.getItem('ratGUID');
		const socket = io({
			path: "/ratchat/socket.io/",
			auth: {
			token: localGUID
			}
		});
		const form = document.getElementById('form');
		const input = document.getElementById('input');
		const messages = document.getElementById('messages');
		let eventList = [];

		const savedBG = localStorage.getItem('ratBG');
		const savedTheme = localStorage.getItem('ratMode');
		const savedMutedUsers = localStorage.getItem('ratMutedUsers');
		const savedMutedEvents = localStorage.getItem('ratMutedEvents');

		let emotes = {};
		let mutedUsers = [];
		let mutedEvents = [];

		//message type to css class
		const toClass = {
			'toClientChat': '',
			'toClientError': 'e-li',
			'toClientInfo': 'i-li',
			'toClientWelcome': 'w-li',
			'toClientAnnouncement': 'a-li',
			'toClientMarkov': '',
			'toClientGame': 'g-li'
		};

		if(savedTheme === 'dark'){
			document.documentElement.setAttribute('data-theme', 'dark');
		}
		if(savedBG){
			document.getElementById('messages-container').style.backgroundImage = `url('${savedBG}')`;
			document.getElementById('messages-container').classList.add('has-bg');
		}
		if(savedMutedUsers){
			mutedUsers = JSON.parse(savedMutedUsers);
		}
		if(savedMutedEvents){
			mutedEvents = JSON.parse(savedMutedEvents);
		}

		//Main window
		initFakeScrollbar({
			containerId: 'messages-wrapper',
			trackId: 'track',
			thumbId: 'fake-scroll-thumb',
			contentId: 'messages',
			btnUpId: 'btn-up',
			btnDownId: 'btn-down'
		});
		//emote popup
		initFakeScrollbar({
			containerId: 'emotes-grid-wrapper',
			trackId: 'emotes-track',
			thumbId: 'emotes-fake-scroll-thumb',
			contentId: 'emotes-grid-wrapper',
			btnUpId: 'emotes-btn-up',
			btnDownId: 'emotes-btn-down'
		});

		socket.on('toClientChat', handleMessage);
		socket.on('toClientInfo', handleMessage);
		socket.on('toClientError', handleMessage);
		socket.on('toClientAnnouncement', handleMessage);
		socket.on('toClientWelcome', handleMessage);
		socket.on('toClientMarkov', handleMessage);
		socket.on('toClientGame', handleMessage);

		socket.on('identity', (identity) => {
			if(identity && identity.guid === 'RESET_IDENTITY'){
				console.log('cleared from local storage');
				localStorage.clear();
				setTimeout(() =>{systemMessage('reloading...', 'i-li');}, 200);
				setTimeout(() =>{window.location.reload();}, 2000);
			} else if(identity && identity.guid){
				localStorage.setItem('ratGUID', identity.guid);
				console.log('identity loaded')
			} else{
				console.log('identity load error')
			}
		});
		
		socket.on('userlist', (uList) => {
			const userListElement = document.getElementById('user-list');
			const lurkerElement = document.getElementById('lurker-status');
			userListElement.replaceChildren();

			let lurkerData = null;

			//build consolidated listing
			const consolidate = new Map();
			uList.forEach(user =>{
				if(user.nick.startsWith('#NONVAL')){
					lurkerData = user;
					return;
				}
				if(consolidate.has(user.nick)){
					consolidate.get(user.nick).count++;
				}
				else{
					consolidate.set(user.nick, {...user, count: 1})
				}
			});

			consolidate.forEach(user => {
				const li = document.createElement('li');
				li.style.marginBottom = "0.125rem";
				
				const userColor = user.nick.substring(0, 7);
				const userName = user.nick.substring(7);

				const orb = user.isAfk ? 'orb-afk' : 'orb-online';
				const orbLabel = user.isAfk ? 'AFK' : 'Online'
				let displayCount = ''

				if(user.count >9){
					//no hiscores
					displayCount = 'a lot';
				}
				else if(user.count > 1){
					displayCount = `${user.count}`;
				}
				
				let status = emotify(user.status)
				if(!status || user.status === 'online'){
					status = '';
				}
				else{
					status = `<div class="user-status"><span class="status-scroll">${status}</span></div>`;
				}
				const modBadge = user.isMod ? `<span class="mod-badge" style="font-size:1rem" title="Mod"><b>&#9929;</b></span>`: '';

				const fontSize = userName.length > 11 ? .8 : 1;
				const dirty = (`
					<span class="user-list-span" style="font-size: ${fontSize}rem">
						<span class="status-orb ${orb}" title="${orbLabel}"></span>
						${modBadge}
						<span style="color: ${userColor}; font-weight: bold;">${userName}</span>
						<span class="user-count">${displayCount}</span>
					</span>
					${status}
				`);
				if(window.DOMPurify){
					li.innerHTML = DOMPurify.sanitize(dirty);
				}
				else{
					li.textContent = `${userName}${user.status ? ` (${user.status})` : ''}`;
					li.style.color = userColor	
				}
				
				userListElement.appendChild(li);
				
				requestAnimationFrame(() => {
					if(
						li.querySelector('.status-scroll') &&
						li.querySelector('.status-scroll').scrollWidth >
						li.querySelector('.user-status').clientWidth
					){
						li.querySelector('.status-scroll').classList.add('animate-status');
					}
				});
			});

			lurkerElement.textContent = `lurkers: ${lurkerData.status}`;
		});

		socket.on('eventlist', (payload) =>{
			eventList = payload;
		});

		socket.on('emotelist', (payload) =>{
			emotes = payload;
			const container = document.getElementById('emotes-grid-wrapper');
			
			container.replaceChildren();

			const grid = document.createElement('div');
			grid.style.display = 'grid';
			grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(1.5rem, 1fr))';
			grid.style.gap = '0.5rem';

			Object.keys(emotes).forEach(name => {
				const img = document.createElement('img');
				img.src = emotes[name];
				img.crossOrigin = "anonymous";
				img.title = name;
				img.alt = name;
				img.dataset.name = name.toLowerCase();
				img.style.width = '1.5rem';
				img.style.height = '1.5rem';
				img.style.cursor = 'pointer';
				img.style.objectFit = 'contain';
				img.className = 'emote-selectable';

				img.onclick = () => {
					const input = document.getElementById('input');
					const space = input.value.length > 0 && !input.value.endsWith(' ') ? ' ' : '';
					input.value += space + name + ' ';
					input.focus();
					document.getElementById('emotes-popup').classList.remove('is-visible');
				};

				grid.appendChild(img);
			});
			container.appendChild(grid);
		});

		socket.on('deleteMsg', (msgArray) => {
			if(!Array.isArray(msgArray)){
				return;
			}
			msgArray.forEach(id => {
				if(id < 0){
					return;
				}
				const targets = document.querySelectorAll(`li[data-id="${id}"]`);
				let target = targets[targets.length - 1];
				if(target){
					if(target.parentElement?.dataset.id === String(id)){
						target = target.parentElement;
					}
					const fresh = target.cloneNode(false);
					fresh.className = 'i-li';
					fresh.textContent = '[message deleted]';
					fresh.title = `Msg ID: ${msg.id}`;
					fresh.setAttribute('data-id', id);
					target.replaceWith(fresh);
				}
			});
		});

		input.focus();

		//LISTENERS//

		//best effort disconnect notification
		window.addEventListener('beforeunload', () => {
			socket.disconnect();
		});

		document.getElementById('btn-users').addEventListener('click', () => {
			document.getElementById('user-sidebar').classList.toggle('collapsed');
			window.dispatchEvent(new Event('resize'));
		});

		document.getElementById('btn-emotes').addEventListener('click', () => {
			const popup = document.getElementById('emotes-popup');
			popup.classList.toggle('is-visible');
			if(popup.classList.contains('is-visible')){
				const search = document.getElementById('search');
				search.value = '';
				filterEmotesGrid('');
				search.focus();
			}
		});

		document.getElementById('search').addEventListener('input', (e) => {
			filterEmotesGrid(e.target.value);
		});

		//Background loader
		document.getElementById('bg-upload').addEventListener('change', function(e){
			const file = e.target.files[0];
			if(file){
				const reader = new FileReader();
				
				reader.onload = function(event){
					const imageData = event.target.result;
					document.getElementById('messages-container').style.backgroundImage = `url('${imageData}')`;
					document.getElementById('messages-container').classList.add('has-bg');
					
					//local storage
					try{
						localStorage.setItem('ratBG', imageData);
					} 
					catch(e){
						systemMessage("system: oh fuk it's too big", 'e-li')
						console.warn("image too large for localStorage");
					}
				}

				reader.readAsDataURL(file);
			}
		});

		//Client submission
		form.addEventListener('submit', async (submitEvent) => {
			submitEvent.preventDefault();

			const val = input.value.trim()
			if(!val){
				return;
			}

			if(val.startsWith('/')){
				const args = val.slice(1).trim().split(/ +/);
				const commandName = args.shift()?.toLowerCase() || '';
				const fullArgs = args.join(' ');

				switch(commandName){
					case 'export':{
						const GUID = localStorage.getItem('ratGUID');
						if(!GUID){
							systemMessage("system: couldn't find local ID.", 'e-li');
							input.value = '';
							return;
						}
						systemMessage(`Your GUID is: ${GUID}`, 'i-li')
						systemMessage(`don't share it, save it! you can use this with /import to reload your identity if necessary.`, 'i-li')
						input.value = '';
						return;
					}
					case 'clear':
					case 'clr':{
						messages.replaceChildren();
						input.value = '';
						return;
					}
					case 'background':
					case 'bg':{
						document.getElementById('bg-upload').click();
						systemMessage("pick a file", 'i-li');
						input.value = '';
						return;
					}
					case 'bgreset':{
						if(localStorage.getItem('ratBG')){
							localStorage.removeItem('ratBG');
							document.getElementById('messages-container').style.backgroundImage = '';
							document.getElementById('messages-container').classList.remove('has-bg');
							systemMessage("background reset", 'i-li');
							input.value = '';
							return;
						}
						else{
							systemMessage('system: no background to reset', 'e-li');
							return;
						}
					}
					case 'dark':{
						if(document.documentElement.hasAttribute('data-theme')){
							document.documentElement.removeAttribute('data-theme');
							localStorage.setItem('ratMode', 'light');
							systemMessage("system: think fast chucklenuts", 'i-li');
						} else {
							document.documentElement.setAttribute('data-theme', 'dark');
							localStorage.setItem('ratMode', 'dark');
							systemMessage("system: bravo 6, going dark", 'i-li');
						}
						input.value = '';
						return;
					}
					case 'mute':
					case 'm':{
						if (eventList.length === 0) {
							systemMessage('fetching event list...', 'i-li');

							const received = await Promise.race([
								new Promise(resolve => socket.emit('requesteventlist', resolve)),
								new Promise(resolve => setTimeout(resolve, 3000))
							]);

							if (eventList.length === 0) {
								systemMessage('system: could not fetch event list, try again later', 'e-li');
								return;
							}
						}
						if(!fullArgs || fullArgs.trim().length === 0){
							systemMessage('system: no mute target provided', 'e-li')
							return;
						}
						else if(fullArgs.includes(' ')){
							systemMessage('system: mute target cannot contain spaces', 'e-li');
							return;
						}
						else if(fullArgs === 'system'){
							systemMessage("system: nice try, but you can't mute ME!", 'e-li')
							input.value = '';
							return;
						}
						else if(fullArgs === 'list'){
							systemMessage(`users muted: ${mutedUsers}`, 'i-li');
							systemMessage(`events muted: ${mutedEvents}`, 'i-li');
							input.value = '';
							return;
						}
						else if(eventList.includes(fullArgs)){
							if(mutedEvents.includes(fullArgs)){
								systemMessage(`${fullArgs} event is already muted, did you mean to /unmute?`, 'i-li');
								return;
							}
							else{
								mutedEvents.push(fullArgs);
								localStorage.setItem('ratMutedEvents', JSON.stringify(mutedEvents));
								systemMessage(`muted event: ${fullArgs}`, 'i-li');
								input.value = '';
								return;
							}
						}
						else{
							if(mutedUsers.includes(fullArgs)){
								systemMessage(`${fullArgs} is already muted, did you mean to /unmute?`, 'i-li');
								return;
							}
							else{
								mutedUsers.push(fullArgs);
								localStorage.setItem('ratMutedUsers', JSON.stringify(mutedUsers));
								systemMessage(`muted user: ${fullArgs}`, 'i-li');
								input.value = '';
								return;
							}
						}
					}
					case 'unmute':{
						if (eventList.length === 0) {
							systemMessage('fetching event list...', 'i-li');

							const received = await Promise.race([
								new Promise(resolve => socket.emit('requesteventlist', resolve)),
								new Promise(resolve => setTimeout(resolve, 3000))
							]);

							if (eventList.length === 0) {
								systemMessage('system: could not fetch event list, try again later', 'e-li');
								return;
							}
						}
						if(!fullArgs || fullArgs.trim().length === 0){
							systemMessage('system: no unmute target provided', 'e-li')
							return;
						}
						else if(fullArgs.includes(' ')){
							systemMessage('system: unmute target cannot contain spaces', 'e-li');
							return;
						}
						else if(fullArgs === 'system'){
							systemMessage("system: wow, thanks. it was getting really stuffy in that data center.", 'i-li')
							input.value = '';
							return;
						}
						else if(fullArgs === 'list'){
							systemMessage(`users muted: ${mutedUsers}`, 'i-li');
							systemMessage(`events muted: ${mutedEvents}`, 'i-li');
							return;
						}
						else if(eventList.includes(fullArgs)){
							if(!mutedEvents.includes(fullArgs)){
								systemMessage(`${fullArgs} event is not muted`, 'i-li');
								return;
							}
							else{
								mutedEvents.splice(mutedEvents.indexOf(fullArgs), 1);
								localStorage.setItem('ratMutedEvents', JSON.stringify(mutedEvents));
								systemMessage(`unmuted event: ${fullArgs}`, 'i-li');
								input.value = '';
								return;
							}
						}
						else{
							if(!mutedUsers.includes(fullArgs)){
								systemMessage(`${fullArgs} is not muted`, 'i-li');
								return;
							}
							else{
								mutedUsers.splice(mutedUsers.indexOf(fullArgs), 1);
								localStorage.setItem('ratMutedUsers', JSON.stringify(mutedUsers));
								systemMessage(`unmuted user: ${fullArgs}`, 'i-li');
								input.value = '';
								return;
							}
						}
					}
					default:{
						socket.emit('toServerChat', val, (clearInput) => {
							if(clearInput){
								input.value = '';
							}
						});
						return;
					}
				}
			}
			//Send message
			socket.emit('toServerChat', val, (clearInput) => {
				if(clearInput){
					input.value = '';
				}
			});

			return;
		});

		//FUNCTIONS//
		function systemMessage(string, className){
			const li = document.createElement('li');
			li.classList.add(className);
			li.textContent = string;
			renderMessage(li);
		}

		function handleMessage(msg){
			if(msg.id >= 0){
				const dupe = document.querySelector(`li[data-id="${msg.id}"]`);
				if(dupe && dupe.dataset.timestamp === String(msg.timestamp)){
					return;
				}
			}

			const className = toClass[msg.type];
			const li = buildMessage(msg, className);

			if(msg.author && mutedUsers.includes(msg.author.substring(7))){
				renderMessage(hideMessage(li, `[a muted user said something. click to reveal]`, '[MUTED]', msg.id, msg.timestamp));
				return;
			}

			renderMessage(li);
		}

		function buildMessage(msg, className){
			const li = document.createElement('li');
			const contentSpan = document.createElement('span');
			let raw = msg.content;

			if (className) {
				li.classList.add(className);
			}

			if(msg.id >=0){
				const date = new Date(msg.timestamp);
				const dateStr = date.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
				const timeSpan = document.createElement('span');
					timeSpan.textContent = dateStr;
					timeSpan.style = "color:grey; font-size:small; margin-right:0.5rem"
				li.appendChild(timeSpan);
			}

			if(msg.id >= 0 && msg.author){
				const userColor = msg.author.substring(0, 7);
				const userName = msg.author.substring(7);
				const nameSpan = document.createElement('span');
				nameSpan.className = 'user-name';
				nameSpan.style.setProperty('--user-color', userColor);
				nameSpan.textContent = userName + ': ';
				li.appendChild(nameSpan);

				if(msg.type === 'toClientMarkov'){
					const parts = msg.content.split('|');
					const gen = parts[0];
					const seed = parts[1];
					li.setAttribute('title', seed ? `Msg ID: ${msg.id} by: ${gen} with seed: ${seed}` : `Msg ID: ${msg.id} by: ${gen}`);
				} 
				else{
					li.setAttribute('title', `Msg ID: ${msg.id}`);
				}

				li.setAttribute('data-id', msg.id);
				li.setAttribute('data-timestamp', msg.timestamp);
			}

			if(msg.type === 'toClientMarkov'){
				const parts = msg.content.split('|');
				raw = parts.slice(2).join('|');
			}

			if(window.DOMPurify && msg.id >= 0){
				const emoted = emotify(raw);
				contentSpan.innerHTML = DOMPurify.sanitize(emoted);
			}
			else{
				contentSpan.textContent = raw;
			}

			li.appendChild(contentSpan);

			return li;
		}

		function hideMessage(li, placeholderText, helperText, id, timestamp){
			const wrapper = document.createElement('li');
			let revealed = false;
			li.title += ' — click to hide';

			const helperSpan = document.createElement('span');
			helperSpan.textContent = helperText;
			helperSpan.style.cssText = 'color:grey; font-size:small; margin-right:0.5rem';
			li.prepend(helperSpan);

			wrapper.classList.add('i-li', 'hidden-message');
			wrapper.textContent = placeholderText;
			wrapper.setAttribute('data-id', id);
			wrapper.setAttribute('data-timestamp', timestamp);
			wrapper.title = `Msg ID: ${id} — click to reveal`;
			wrapper.addEventListener('click', () => {
				if(!revealed){
					wrapper.classList.remove('i-li');
					wrapper.classList.add('revealed-message');
					wrapper.replaceChildren(li);
					revealed = true;
				}
				else{
					wrapper.classList.add('i-li');
					wrapper.classList.remove('revealed-message');
					wrapper.textContent = placeholderText;
					wrapper.title = `Msg ID: ${id} — click to reveal`;
					revealed = false;
				}
			});

			return wrapper;
		}

		function renderMessage(li){
			const msgContainer = document.getElementById('messages-wrapper');
			const isAtBottom = msgContainer.scrollHeight - msgContainer.clientHeight <= msgContainer.scrollTop + 20;
			messages.appendChild(li);
			if(messages.children.length > 255){
				messages.firstChild.remove();
			}
			if(isAtBottom){
				msgContainer.scrollTop = msgContainer.scrollHeight;
			}
		}

		//Helper function for non user messages

		function emotify(text){
			return text.split(' ').map(word => {
				if(emotes[word]){
					return `<img src="${emotes[word]}" title="${word}" alt="${word}" class="emote" crossorigin="anonymous">`;
				}
				return word;
			}).join(' ');
		}

		function filterEmotesGrid(filter){
			const lowerFilter = (filter || '').trim().toLowerCase();
			document.querySelectorAll('#emotes-grid-wrapper .emote-selectable').forEach(img => {
				img.style.display = img.dataset.name.includes(lowerFilter) ? '' : 'none';
			});
			document.getElementById('emotes-grid-wrapper').scrollTop = 0;
		}

		//Fake scrollbar
		function initFakeScrollbar(config){
			const container = document.getElementById(config.containerId);
			const thumb = document.getElementById(config.thumbId);
			const track = document.getElementById(config.trackId);
			const content = document.getElementById(config.contentId);

			//sync thumb position to scroll
			container.onscroll = function (){
				const scrollPos = container.scrollTop;
				const maxScroll = container.scrollHeight - container.clientHeight;
				
				const clampedScroll = Math.max(0, Math.min(scrollPos, maxScroll));

				const trackSpace = track.clientHeight - thumb.clientHeight;
				thumb.style.top = (clampedScroll / (maxScroll || 1)) * trackSpace + 'px';
			};

			if(config.btnUpId){
				document.getElementById(config.btnUpId).onclick = () =>
					container.scrollBy(0, -50);
			}

			if(config.btnDownId){
				document.getElementById(config.btnDownId).onclick = () =>
					container.scrollBy(0, 50);
			}

			//dynamic thumb resizing using a self-executing function for the MutationObserver
			new MutationObserver(() => {
				thumb.style.height =
					Math.max(
						(container.clientHeight / container.scrollHeight) * track.clientHeight,
						20
					) + 'px';
			}).observe(content, { childList: true, subtree: true });

			//sync resize event
			window.addEventListener('resize', () => {
				thumb.style.height =
					Math.max(
						(container.clientHeight / container.scrollHeight) * track.clientHeight,
						20
					) + 'px';
			});

			//click and drag thumb
			thumb.addEventListener('mousedown', (e) => {
				document.onmousemove = (event) => {
					container.scrollTop =
						((event.pageY - e.pageY) *
							(container.scrollHeight / track.clientHeight)) +
						container.scrollTop;
					e = event;
				};

				document.onmouseup = () => {
					document.onmousemove = null;
					document.onmouseup = null;
				};

				e.preventDefault();
			});
		}

	</script>
